---
envoy_package_name: envoy

envoy_version: "1.32.2"
envoy_redhat_version: "1.32.2"

envoy_apt_repo_url: "https://apt.envoyproxy.io"
envoy_apt_distribution: "jammy"

envoy_keyring_path: "/etc/apt/keyrings/envoy-keyring.gpg"
envoy_repo_file: "/etc/apt/sources.list.d/envoy.list"

envoy_config_dir: "/etc/envoy"
envoy_config_path: "{{ envoy_config_dir }}/envoy.yaml"

envoy_binary_path: "/usr/bin/envoy"

envoy_admin_port: 9901
envoy_service_name: envoy

envoy_listener_address: "0.0.0.0"
envoy_admin_address: "0.0.0.0"

envoy_arch_map:
  x86_64: amd64
  aarch64: arm64

envoy_arch: "{{ envoy_arch_map.get(ansible_architecture, ansible_architecture) }}"


# =========================
# TLS CONFIG (ENABLE TLS TERMINATION AT ENVOY)
# =========================

envoy_tls_enabled: true

envoy_http_port: 80
envoy_https_port: 443

envoy_tls_cert_file: "/etc/envoy/tls/tls.crt"
envoy_tls_key_file: "/etc/envoy/tls/tls.key"


# =========================
# VIRTUAL HOST ROUTING CONFIG
# =========================

envoy_virtual_hosts:

  # PMM Service
  - name: pmm_service
    domains:
      - "pmm.opstree.dev"
    routes:
      - prefix: "/"
        cluster: pmm_cluster
        match_type: prefix


  # Docs Service
  - name: docs_service
    domains:
      - "docs.opstree.dev"
    routes:
      - prefix: "/"
        cluster: docs_cluster
        match_type: prefix


  # Orchestrator Service
  - name: orchestrator_service
    domains:
      - "orchestrator.ldc.opstree.dev"
    routes:
      - prefix: "/"
        cluster: orchestrator_cluster
        match_type: prefix


  # Default fallback
  - name: default_service
    domains:
      - "*"
    routes:
      - prefix: "/"
        cluster: pmm_cluster
        match_type: prefix



# =========================
# BACKEND CLUSTERS CONFIG (USING INTERNAL IPs)
# =========================

envoy_clusters:

  - name: pmm_cluster

    connect_timeout: 5s

    lb_policy: ROUND_ROBIN

    health_check_path: /

    protocol: https


    endpoints:

      - ip: 192.168.8.204
        port: 8443



  - name: docs_cluster

    connect_timeout: 5s

    lb_policy: ROUND_ROBIN

    health_check_path: /

    endpoints:

      - ip: 192.168.10.84
        port: 80



  - name: orchestrator_cluster

    connect_timeout: 5s

    lb_policy: ROUND_ROBIN

    health_check_path: /

    endpoints:

      - ip: 192.168.8.34
        port: 80
