---
- name: Install required dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
      - ca-certificates
    state: present
    update_cache: true

- name: Ensure APT keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# Download ASCII key first
- name: Download Envoy GPG key (ASCII)
  ansible.builtin.get_url:
    url: "{{ envoy_apt_repo_url }}/signing.key"
    dest: /tmp/envoy-signing.key
    mode: '0644'

#  Convert to binary keyring 
- name: Convert key to binary keyring
  ansible.builtin.command:
    cmd: "gpg --dearmor -o {{ envoy_keyring_path }} /tmp/envoy-signing.key"
    creates: "{{ envoy_keyring_path }}"

# Use jammy explicitly
- name: Add Envoy APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ envoy_arch }} signed-by={{ envoy_keyring_path }}] {{ envoy_apt_repo_url }} {{ envoy_apt_distribution }} main"
    filename: envoy
    state: present
    update_cache: true


- name: Install Envoy (version pinned)
  ansible.builtin.apt:
    name: "{{ envoy_package_name }}={{ envoy_version }}*"
    state: present
  when: envoy_version | length > 0

- name: Install Envoy (latest)
  ansible.builtin.apt:
    name: "{{ envoy_package_name }}"
    state: latest
  when: envoy_version | length == 0

- name: Create Envoy config directory
  ansible.builtin.file:
    path: "{{ envoy_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy Envoy config file
  ansible.builtin.template:
    src: envoy.yaml.j2
    dest: "{{ envoy_config_path }}"
    owner: root
    group: root
    mode: '0644'
  notify:
    - Validate Envoy config
    - Restart Envoy

- name: Create systemd service file
  ansible.builtin.template:
    src: envoy.service.j2
    dest: /etc/systemd/system/envoy.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd

- name: Enable and start Envoy service
  ansible.builtin.systemd:
    name: "{{ envoy_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
